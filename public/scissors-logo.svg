<svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Group for the scissors -->
  <g stroke="#6D3294" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left handle -->
    <circle cx="72" cy="78" r="10" />
    <!-- Right handle -->
    <circle cx="128" cy="78" r="10" />
    
    <!-- Left blade extending to right handle -->
    <line x1="60" y1="10" x2="121" y2="71" />
    
    <!-- Right blade extending to left handle -->
    <line x1="140" y1="10" x2="79" y2="71" />
  </g>
  
  <!-- "20" on the left -->
  <text x="35" y="60" font-family="Georgia, serif" font-size="36" fill="#6D3294" text-anchor="middle">20</text>
  
  <!-- "18" on the right -->
  <text x="165" y="60" font-family="Georgia, serif" font-size="36" fill="#6D3294" text-anchor="middle">18</text>
  
  <!-- Optional center peg/screw -->
  <circle cx="100" cy="50" r="3" fill="#6D3294" />
</svg>
